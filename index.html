<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>くじを引く</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #f5f7fa, #c3cfe2);
      padding: 20px;
    }
    .card {
      background: white;
      border-radius: 24px;
      padding: 48px 32px;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0,0,0,0.12);
      width: 100%;
      max-width: 400px;
    }
    .emoji { font-size: 64px; margin-bottom: 24px; }
    h2 { color: #333; font-size: 22px; line-height: 1.6; margin-bottom: 12px; }
    p { color: #888; font-size: 16px; margin-bottom: 36px; line-height: 1.6; }
    .btn {
      display: block; width: 100%; padding: 20px;
      background: linear-gradient(135deg, #ff6b35, #f7931e);
      color: white; border-radius: 16px; text-decoration: none;
      font-weight: bold; font-size: 22px; cursor: pointer; border: none;
      box-shadow: 0 4px 16px rgba(255,107,53,0.4);
    }
    .btn:disabled { background: #ccc; box-shadow: none; }
    .error { color: #e53935; font-size: 18px; font-weight: bold; line-height: 1.6; }
    .result-icon { font-size: 80px; margin-bottom: 24px; }
    .result-rank { font-size: 32px; font-weight: bold; margin-bottom: 16px; }
    .result-message { font-size: 18px; line-height: 1.6; font-weight: bold; }
    .win { color: #e65100; }
    .lose { color: #2c5f8a; }
  </style>
</head>
<body>
  <div class="card" id="card">
    <!-- 初期表示はJSで制御 -->
  </div>

  <script>
    const DEPLOY_URL = 'https://script.google.com/macros/s/AKfycbzAWybeMu2btSHtAdqyyYjQpT-nV3ZAKy13ViyWweBUeETbqfhS_v7mxadzfrzH49UF/exec';
    const card = document.getElementById('card');

    // URLからトークンを取得
    const params = new URLSearchParams(window.location.search);
    const token = params.get('t');

    if (!token) {
      // トークンなし→エラー表示
      card.innerHTML = `
        <div class="emoji">🚫</div>
        <p class="error">このページは直接アクセスできません。<br>アンケート回答後のURLからアクセスしてください。</p>
      `;
    } else {
      // トークンあり→くじ画面表示
      card.innerHTML = `
        <div class="emoji">🎯</div>
        <h2>アンケートへのご回答<br>ありがとうございます！</h2>
        <p>下のボタンをタップして<br>くじを引いてください！</p>
        <button class="btn" id="drawBtn">くじを引く！</button>
      `;

      document.getElementById('drawBtn').addEventListener('click', function() {
        this.textContent = '抽選中...';
        this.disabled = true;

        fetch(DEPLOY_URL + '?mode=draw&t=' + encodeURIComponent(token))
          .then(r => r.json())
          .then(data => {
            if (data.result === 'win') {
              card.style.background = 'linear-gradient(135deg, #fff9e6, #ffe0b2)';
              document.body.style.background = 'linear-gradient(135deg, #fff9e6, #ffe0b2)';
              card.innerHTML = `
                <div class="result-icon">${data.icon}</div>
                <div class="result-rank win">${data.rank}</div>
                <div class="result-message win">${data.message}</div>
              `;
            } else if (data.result === 'lose') {
              card.innerHTML = `
                <div class="result-icon">😢</div>
                <div class="result-message lose">ハズレ。またのご参加をお待ちしています！</div>
              `;
            } else {
              card.innerHTML = `
                <div class="emoji">⚠️</div>
                <p class="error">${data.message}</p>
              `;
            }
          })
          .catch(() => {
            card.innerHTML = `
              <div class="emoji">⚠️</div>
              <p class="error">エラーが発生しました。<br>もう一度お試しください。</p>
            `;
          });
      });
    }
  </script>
</body>
</html>
